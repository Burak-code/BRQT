<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRQT - Brain Response Quality Technology</title>
    <style>
        /* ===== Genel Sıfırlama ve Değişkenler ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glow-color: #258CFF;
            --bg-color: #0d1322;
            --panel-color: #131d31;
            --text-color: #edf5ff;
            --muted-color: #9bb0cf;
            --border-radius: 28px;
            --shadow-size: 16px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background 0.3s;
        }

        /* ===== Ana Pencere ===== */
        .window {
            width: 780px;
            max-width: 100%;
            height: 650px;
            max-height: 95vh;
            background: var(--bg-color);
            border-radius: var(--border-radius);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 60px var(--glow-color), 0 0 100px rgba(37, 140, 255, 0.2);
            transition: box-shadow 0.4s ease;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* Dış glow katmanı (pseudo) */
        .window::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: calc(var(--border-radius) + 6px);
            padding: 6px;
            background: var(--glow-color);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.8;
            transition: background 0.4s;
        }

        /* İkinci iç glow */
        .window::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: calc(var(--border-radius) - 4px);
            background: var(--panel-color);
            opacity: 0.3;
            pointer-events: none;
            filter: blur(8px);
        }

        /* ===== Başlık Çubuğu ===== */
        .title-bar {
            background: var(--bg-color);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title-bar .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-bar .settings-btn {
            background: transparent;
            border: none;
            color: var(--muted-color);
            font-size: 14px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            transition: 0.2s;
            font-weight: 500;
        }
        .title-bar .settings-btn:hover {
            color: var(--text-color);
            background: rgba(255,255,255,0.05);
        }

        .title-bar .brand {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-color);
            user-select: none;
            margin-left: 4px;
        }

        .title-bar .window-controls {
            display: flex;
            gap: 10px;
        }

        .title-bar .window-controls button {
            background: transparent;
            border: none;
            color: var(--muted-color);
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 300;
            line-height: 1;
        }
        .title-bar .window-controls button:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-color);
        }
        .title-bar .window-controls .close-btn:hover {
            background: #e74c3c;
            color: white;
        }

        /* ===== Sohbet Alanı ===== */
        .chat-container {
            flex: 1;
            background: var(--panel-color);
            margin: 0 12px 6px 12px;
            border-radius: 16px;
            overflow-y: auto;
            padding: 16px 20px;
            position: relative;
            z-index: 2;
            scroll-behavior: smooth;
            min-height: 0;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--glow-color);
            border-radius: 10px;
        }

        .message {
            margin-bottom: 18px;
            animation: fadeIn 0.25s ease;
        }

        .message .sender {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 2px;
        }
        .message .sender.bot {
            color: #89bfff;
        }
        .message .sender.user {
            color: #b9e1ff;
        }

        .message .content {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: rgba(255,255,255,0.02);
            padding: 6px 12px;
            border-radius: 10px;
            display: inline-block;
            max-width: 95%;
        }

        .message.user .content {
            background: rgba(37, 140, 255, 0.12);
            border-left: 3px solid var(--glow-color);
        }

        .message.bot .content {
            background: rgba(255,255,255,0.03);
            border-left: 3px solid #5a8ab5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Yazıyor... göstergesi ===== */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid #5a8ab5;
            padding: 10px 14px;
            border-radius: 10px;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--glow-color);
            display: inline-block;
            animation: typingBounce 1.2s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* ===== Mikrofon & Dışa Aktar Butonları ===== */
        .icon-btn {
            background: #18243a;
            border: none;
            color: var(--muted-color);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: #223252;
            color: var(--text-color);
        }
        .icon-btn.listening {
            background: #e74c3c;
            color: white;
            animation: micPulse 1s infinite;
        }
        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.5); }
            50% { box-shadow: 0 0 0 8px rgba(231, 76, 60, 0); }
        }

        /* ===== Alt Bilgi ===== */
        .footer {
            text-align: center;
            font-size: 11px;
            font-style: italic;
            color: var(--muted-color);
            padding: 2px 0 4px 0;
            z-index: 2;
            opacity: 0.6;
            letter-spacing: 0.3px;
        }

        /* ===== Giriş Alanı ===== */
        .input-row {
            background: var(--bg-color);
            padding: 8px 16px 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 2;
            flex-shrink: 0;
        }

        .input-row input {
            flex: 1;
            background: #18243a;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }
        .input-row input:focus {
            box-shadow: 0 0 0 2px var(--glow-color);
        }
        .input-row input::placeholder {
            color: #5a7a9a;
        }

        .input-row button {
            background: var(--glow-color);
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .input-row button:hover {
            background: #4ea4ff;
            transform: scale(1.02);
        }
        .input-row button:active {
            transform: scale(0.97);
        }

        /* ===== Ayarlar Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--panel-color);
            border-radius: 24px;
            padding: 32px 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.06);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--text-color);
            text-align: center;
        }

        .modal label {
            display: block;
            font-weight: 500;
            margin-top: 14px;
            color: var(--muted-color);
            font-size: 14px;
        }

        .modal .color-preview {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 6px;
        }

        .modal .color-preview input[type="color"] {
            width: 50px;
            height: 50px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
        }

        .modal .color-preview span {
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            padding: 6px 14px;
            border-radius: 20px;
            color: var(--text-color);
            font-family: monospace;
        }

        .modal .lang-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .modal .lang-buttons button {
            flex: 1;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #263a5b;
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            font-size: 14px;
        }
        .modal .lang-buttons button:hover {
            background: #2f4a72;
        }
        .modal .lang-buttons button.active {
            background: var(--glow-color);
            border-color: var(--glow-color);
        }

        .modal .close-modal-btn {
            display: block;
            width: 100%;
            margin-top: 24px;
            padding: 10px;
            background: #263a5b;
            border: none;
            color: var(--text-color);
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal .close-modal-btn:hover {
            background: #3a5277;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .window {
                height: 95vh;
                border-radius: 20px;
                max-height: 95vh;
            }
            .title-bar .brand {
                font-size: 18px;
            }
            .title-bar .settings-btn {
                font-size: 12px;
            }
            .input-row input {
                font-size: 13px;
                padding: 10px 14px;
            }
            .input-row button {
                padding: 8px 16px;
                font-size: 13px;
            }
            .modal {
                padding: 24px 20px;
            }
        }

        /* ===== Scroll genel ===== */
        .chat-container {
            scrollbar-width: thin;
            scrollbar-color: var(--glow-color) transparent;
        }
    </style>
</head>
<body>

    <!-- ======== ANA PENCERE ======== -->
    <div class="window" id="appWindow">

        <!-- Başlık Çubuğu -->
        <div class="title-bar" id="titleBar">
            <div class="left">
                <button class="settings-btn" id="settingsBtn">⚙ Ayarlar</button>
                <span class="brand">BRQT</span>
            </div>
            <div class="window-controls">
                <button id="minimizeBtn" title="Küçült">—</button>
                <button id="maximizeBtn" title="Büyült">□</button>
                <button class="close-btn" id="closeBtn" title="Kapat">✕</button>
            </div>
        </div>

        <!-- Sohbet Alanı -->
        <div class="chat-container" id="chatContainer"></div>

        <!-- Alt Bilgi -->
        <div class="footer">Brain Response Quality Technology</div>

        <!-- Giriş Alanı -->
        <div class="input-row">
            <button class="icon-btn" id="micBtn" title="Sesli komut">🎤</button>
            <input type="text" id="userInput" placeholder="Mesajınızı yazın..." autofocus>
            <button id="sendBtn">Gönder</button>
            <button class="icon-btn" id="exportBtn" title="Sohbeti indir">⬇</button>
        </div>
    </div>

    <!-- ======== AYARLAR MODAL ======== -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙ BRQT Ayarları</h2>

            <label>Fon ışığı rengi</label>
            <div class="color-preview">
                <input type="color" id="glowColorPicker" value="#258CFF">
                <span id="glowColorHex">#258CFF</span>
            </div>

            <label>Varsayılan Arama Dili</label>
            <div class="lang-buttons">
                <button id="langTr" class="active">🇹🇷 Türkçe</button>
                <button id="langEn">🇬🇧 English</button>
            </div>

            <label>Sesli Yanıt (BRQT cevapları seslendirsin)</label>
            <div class="lang-buttons">
                <button id="voiceOnBtn">🔊 Açık</button>
                <button id="voiceOffBtn" class="active">🔇 Kapalı</button>
            </div>

            <button class="close-modal-btn" id="closeModalBtn">Kapat</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  BRQT – WEB SÜRÜMÜ (Tüm mantık JavaScript ile)
        // ============================================================

        (function() {
            'use strict';

            // --- DOM referansları ---
            const chatEl = document.getElementById('chatContainer');
            const inputEl = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const settingsBtn = document.getElementById('settingsBtn');
            const modal = document.getElementById('settingsModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const glowPicker = document.getElementById('glowColorPicker');
            const glowHex = document.getElementById('glowColorHex');
            const langTr = document.getElementById('langTr');
            const langEn = document.getElementById('langEn');
            const closeWinBtn = document.getElementById('closeBtn');
            const minimizeBtn = document.getElementById('minimizeBtn');
            const maximizeBtn = document.getElementById('maximizeBtn');
            const appWindow = document.getElementById('appWindow');
            const micBtn = document.getElementById('micBtn');
            const exportBtn = document.getElementById('exportBtn');
            const voiceOnBtn = document.getElementById('voiceOnBtn');
            const voiceOffBtn = document.getElementById('voiceOffBtn');

            // --- Google Custom Search API Ayarları ---
            // Buraya kendi Google API anahtarınızı ve Arama Motoru Kimliğinizi (cx) girin:
            // 1) https://console.cloud.google.com/ adresinden bir proje oluşturun, "Custom Search API"yi
            //    etkinleştirin ve bir API anahtarı alın.
            // 2) https://programmablesearchengine.google.com/ adresinden ücretsiz bir Programmable Search
            //    Engine oluşturun ve "cx" (Arama motoru kimliği) değerini alın. Motoru "tüm web'de ara"
            //    olacak şekilde ayarlamayı unutmayın.
            // Not: Ücretsiz katmanda günde 100 sorgu hakkı vardır; sonrasında ücretlidir.
            const GOOGLE_API_KEY = ''; // örn: 'AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX'
            const GOOGLE_CX = '';      // örn: '017576662512468239146:omuauf_lfve'

            // --- Durum ---
            let glowColor = '#258CFF';
            let searchLang = 'tr';        // 'tr' veya 'en'
            let isMaximized = false;
            let voiceReplyEnabled = false;
            let isListening = false;
            let recognition = null;

            // Veri depoları (localStorage)
            let notes = [];
            let reminders = [];
            let shortcuts = {};
            let passwords = {};
            let alarms = [];

            // Son arama sonuçları (dosya / uygulama) – web'de placeholder
            let lastFiles = [];
            let lastApps = [];
            let lastKind = null; // 'file' veya 'app'

            // Hatırlatıcı / Alarm kontrolü
            let reminderInterval = null;

            // --- Yardımcı Fonksiyonlar ---

            // Veri yükleme / kaydetme
            function loadData(key, defaultVal) {
                try {
                    const raw = localStorage.getItem('brqt_' + key);
                    return raw ? JSON.parse(raw) : defaultVal;
                } catch { return defaultVal; }
            }
            function saveData(key, data) {
                try {
                    localStorage.setItem('brqt_' + key, JSON.stringify(data));
                } catch {}
            }

            function loadAllData() {
                notes = loadData('notes', []);
                reminders = loadData('reminders', []);
                shortcuts = loadData('shortcuts', {});
                passwords = loadData('passwords', {});
                alarms = loadData('alarms', []);
                // Glow ve dil
                const savedGlow = localStorage.getItem('brqt_glow');
                if (savedGlow) {
                    glowColor = savedGlow;
                    glowPicker.value = glowColor;
                    glowHex.textContent = glowColor;
                    applyGlow(glowColor);
                }
                const savedLang = localStorage.getItem('brqt_lang');
                if (savedLang === 'en' || savedLang === 'tr') {
                    searchLang = savedLang;
                    updateLangButtons();
                }
                const savedVoice = localStorage.getItem('brqt_voice_reply');
                voiceReplyEnabled = savedVoice === '1';
                updateVoiceButtons();
            }

            function saveAllData() {
                saveData('notes', notes);
                saveData('reminders', reminders);
                saveData('shortcuts', shortcuts);
                saveData('passwords', passwords);
                saveData('alarms', alarms);
                localStorage.setItem('brqt_glow', glowColor);
                localStorage.setItem('brqt_lang', searchLang);
                localStorage.setItem('brqt_voice_reply', voiceReplyEnabled ? '1' : '0');
            }

            function updateVoiceButtons() {
                if (!voiceOnBtn || !voiceOffBtn) return;
                voiceOnBtn.classList.toggle('active', voiceReplyEnabled);
                voiceOffBtn.classList.toggle('active', !voiceReplyEnabled);
            }

            // Glow rengini uygula
            function applyGlow(color) {
                document.documentElement.style.setProperty('--glow-color', color);
                // Window glow
                appWindow.style.boxShadow = `0 0 30px rgba(0,0,0,0.8), 0 0 60px ${color}, 0 0 100px ${color}40`;
                // Pseudo-element rengi
                const style = document.createElement('style');
                style.id = 'dynamic-glow-style';
                style.textContent = `
                    .window::before { background: ${color} !important; }
                    .chat-container::-webkit-scrollbar-thumb { background: ${color}; }
                    .input-row input:focus { box-shadow: 0 0 0 2px ${color}; }
                    .input-row button { background: ${color}; }
                    .input-row button:hover { background: ${adjustBrightness(color, 20)}; }
                    .modal .lang-buttons button.active { background: ${color}; border-color: ${color}; }
                    .message.user .content { border-left-color: ${color}; }
                `;
                const old = document.getElementById('dynamic-glow-style');
                if (old) old.remove();
                document.head.appendChild(style);
                glowHex.textContent = color;
                glowPicker.value = color;
                localStorage.setItem('brqt_glow', color);
            }

            function adjustBrightness(hex, percent) {
                // Basit brightness ayarı (sadece yaklaşık)
                let r = parseInt(hex.slice(1,3), 16);
                let g = parseInt(hex.slice(3,5), 16);
                let b = parseInt(hex.slice(5,7), 16);
                r = Math.min(255, Math.max(0, r + percent));
                g = Math.min(255, Math.max(0, g + percent));
                b = Math.min(255, Math.max(0, b + percent));
                return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
            }

            // Dil butonlarını güncelle
            function updateLangButtons() {
                langTr.classList.toggle('active', searchLang === 'tr');
                langEn.classList.toggle('active', searchLang === 'en');
            }

            // Mesaj ekleme
            function addMessage(sender, text) {
                const div = document.createElement('div');
                div.className = `message ${sender === 'BRQT' ? 'bot' : 'user'}`;
                const senderSpan = document.createElement('div');
                senderSpan.className = `sender ${sender === 'BRQT' ? 'bot' : 'user'}`;
                senderSpan.textContent = sender;
                const contentSpan = document.createElement('div');
                contentSpan.className = 'content';
                // Metni HTML olarak değil, düz metin olarak göster (ama \n korunsun)
                contentSpan.textContent = text;
                div.appendChild(senderSpan);
                div.appendChild(contentSpan);
                chatEl.appendChild(div);
                chatEl.scrollTop = chatEl.scrollHeight;

                if (sender === 'BRQT' && voiceReplyEnabled) {
                    speakText(text);
                }
            }

            // --- "BRQT yazıyor..." göstergesi ---
            let typingEl = null;
            function showTyping() {
                if (typingEl) return;
                typingEl = document.createElement('div');
                typingEl.className = 'message bot';
                typingEl.innerHTML = `
                    <div class="sender bot">BRQT</div>
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                `;
                chatEl.appendChild(typingEl);
                chatEl.scrollTop = chatEl.scrollHeight;
            }
            function hideTyping() {
                if (typingEl) {
                    typingEl.remove();
                    typingEl = null;
                }
            }

            // --- Sesli Yanıt (Text-to-Speech) ---
            function speakText(text) {
                try {
                    if (!('speechSynthesis' in window)) return;
                    window.speechSynthesis.cancel();
                    const utter = new SpeechSynthesisUtterance(text);
                    utter.lang = searchLang === 'tr' ? 'tr-TR' : 'en-US';
                    utter.rate = 1;
                    window.speechSynthesis.speak(utter);
                } catch {}
            }

            // --- Sesli Komut (Speech-to-Text) ---
            function initSpeechRecognition() {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) return null;
                const rec = new SR();
                rec.lang = searchLang === 'tr' ? 'tr-TR' : 'en-US';
                rec.interimResults = false;
                rec.maxAlternatives = 1;
                rec.onresult = (e) => {
                    const transcript = e.results[0][0].transcript;
                    inputEl.value = transcript;
                    sendMessage();
                };
                rec.onerror = () => {
                    isListening = false;

            // --- Ücretsiz, anahtar gerektirmeyen yedek arama (DuckDuckGo Instant Answer API) ---
            // Google API anahtarı tanımlı değilse bu fonksiyon devreye girer.
            // Herhangi bir kayıt/API anahtarı gerektirmez, tamamen ücretsizdir.
            // Not: DuckDuckGo'nun bu ücretsiz servisi Google kadar geniş kapsamlı değildir;
            // en iyi sonucu tanım/özet gerektiren sorularda verir (ör. "X nedir", "Y kimdir").
            async function duckDuckGoAnswer(query, english) {
                try {
                    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1&no_html=1&skip_disambig=1`;
                    const res = await fetch(url);
                    const data = await res.json();

                    const abstract = (data.AbstractText || data.Abstract || '').trim();
                    const answer = (data.Answer || '').trim();
                    const definition = (data.Definition || '').trim();
                    const source = data.AbstractSource || data.DefinitionSource || 'DuckDuckGo';
                    const url2 = data.AbstractURL || data.DefinitionURL || '';

                    let body = answer || abstract || definition;

                    // Bazı sorularda ana metin boş gelir, ilgili konular listesinden derle.
                    if (!body && Array.isArray(data.RelatedTopics) && data.RelatedTopics.length > 0) {
                        const related = data.RelatedTopics
                            .filter(t => t && t.Text)
                            .slice(0, 3)
                            .map(t => `• ${t.Text}`)
                            .join('\n');
                        if (related) body = related;
                    }

                    if (!body) return null; // Çağıran fonksiyon başka bir kaynağa geçsin.

                    const header = english
                        ? `🔎 Here's what I found for "${query}" (source: ${source}):\n\n`
                        : `🔎 "${query}" için bulduklarım (kaynak: ${source}):\n\n`;

                    return header + body + (url2 ? `\n\n${url2}` : '');
                } catch (err) {
                    return null;
                }
            }

            // --- Uzun metinleri MyMemory API ile parça parça Türkçe'ye çeviren yardımcı ---
            // MyMemory'nin ücretsiz katmanı tek istekte uzun metinleri kabul etmediği için
            // metin cümlelere bölünüp sırayla çevrilir, sonra birleştirilir.
            async function translateToTurkish(text) {
                if (!text) return text;
                // Cümlelere böl (nokta/soru/ünlem sonrası), ~400 karaktere kadar öbekle.
                const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
                const chunks = [];
                let current = '';
                for (const s of sentences) {
                    if ((current + s).length > 400 && current) {
                        chunks.push(current.trim());
                        current = s;
                    } else {
                        current += s;
                    }
                }
                if (current.trim()) chunks.push(current.trim());

                const translatedChunks = [];
                for (const chunk of chunks) {
                    try {
                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(chunk)}&langpair=en|tr`);
                        const data = await res.json();
                        translatedChunks.push(
                            (data.responseData && data.responseData.translatedText) || chunk
                        );
                    } catch {
                        translatedChunks.push(chunk); // Çeviri başarısız olursa orijinali koru.
                    }
                }
                return translatedChunks.join(' ');
            }


            // DuckDuckGo bir şey bulamazsa bu devreye girer. Tamamen ücretsiz, kayıt/API
            // anahtarı gerektirmez ve gerçek Wikipedia içeriğinden özet döndürür.
            // Kapsamı artırmak için önce TAM METİN arama (list=search) denenir; bu,
            // sorgu bir başlıkla birebir örtüşmese bile ilgili sayfayı bulabilir.
            // Sonuç yoksa başlık-öneki eşleşmesi (opensearch) yedek olarak denenir.
            async function wikipediaAnswer(query, english, langOverride) {
                const lang = langOverride || (searchLang === 'tr' ? 'tr' : 'en');
                try {
                    let title = null;

                    // 1) Tam metin arama - en geniş kapsam.
                    const searchUrl = `https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&srlimit=1&origin=*`;
                    const searchRes = await fetch(searchUrl);
                    const searchData = await searchRes.json();
                    const hits = searchData && searchData.query && searchData.query.search;
                    if (hits && hits[0] && hits[0].title) title = hits[0].title;

                    // 2) Bulunamadıysa başlık-öneki eşleşmesi (opensearch) dene.
                    if (!title) {
                        const osUrl = `https://${lang}.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=1&namespace=0&format=json&origin=*`;
                        const osRes = await fetch(osUrl);
                        const osData = await osRes.json();
                        title = osData && osData[1] && osData[1][0];
                    }

                    if (!title) return null;

                    // 3) Bulunan başlığın özetini çek.
                    const summaryUrl = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
                    const summaryRes = await fetch(summaryUrl);
                    if (!summaryRes.ok) return null;
                    const summaryData = await summaryRes.json();

                    const extract = (summaryData.extract || '').trim();
                    if (!extract) return null;

                    const pageUrl = (summaryData.content_urls && summaryData.content_urls.desktop && summaryData.content_urls.desktop.page) || '';

                    // Kaynak İngilizce Wikipedia ise ve kullanıcı Türkçe konuşuyorsa,
                    // metni ücretsiz MyMemory API'si ile Türkçe'ye çevirip öyle sun.
                    let finalExtract = extract;
                    let translatedNote = '';
                    if (lang === 'en' && !english) {
                        finalExtract = await translateToTurkish(extract);
                        translatedNote = ' - çevirisi yapıldı';
                    }

                    const sourceLabel = (lang === 'en' && !english)
                        ? `İngilizce Wikipedia - ${title}${translatedNote}`
                        : `Wikipedia - ${title}`;
                    const header = english
                        ? `🔎 Here's what I found for "${query}" (source: Wikipedia - ${title}):\n\n`
                        : `🔎 "${query}" için bulduklarım (kaynak: ${sourceLabel}):\n\n`;

                    return header + finalExtract + (pageUrl ? `\n\n${pageUrl}` : '');
                } catch (err) {
                    return null;
                }
            }

            // --- Google'dan gerçek sonuçlarla cevap üretme ---

            async function googleAnswer(query, english) {

                        : `"${query}" için kendim araştırdım (DuckDuckGo + iki dilde Wikipedia) ama doğrudan bir cevap bulamadım. Daha geniş kapsamlı sonuçlar için script'in başındaki GOOGLE_API_KEY ve GOOGLE_CX alanlarını doldurabilirsin (Google Custom Search günde 100 ücretsiz arama verir) — o zaman hemen hemen her şeyi doğrudan sohbette yanıtlayabilirim.`;

                    const res = await fetch(url);

                    const items = data.items || [];

            // --- Ücretsiz, anahtar gerektirmeyen İngilizce sözlük (dictionaryapi.dev) ---
            async function dictionaryDefine(word, english) {
                try {
                    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.trim())}`);
                    if (!res.ok) {
                        return english
                            ? `❌ I couldn't find a definition for "${word}".`
                            : `❌ "${word}" için bir tanım bulamadım.`;
                    }
                    const data = await res.json();
                    const entry = data && data[0];
                    const meaning = entry && entry.meanings && entry.meanings[0];
                    const def = meaning && meaning.definitions && meaning.definitions[0] && meaning.definitions[0].definition;
                    if (!def) {
                        return english
                            ? `❌ I couldn't find a definition for "${word}".`
                            : `❌ "${word}" için bir tanım bulamadım.`;
                    }
                    const partOfSpeech = meaning.partOfSpeech || '';
                    if (english) {
                        return `📖 ${word} (${partOfSpeech}): ${def}`;
                    }
                    const translatedDef = await translateToTurkish(def);
                    return `📖 ${word} (${partOfSpeech}): ${translatedDef}`;
                } catch (err) {
                    return english
                        ? "❌ I couldn't reach the dictionary service right now."
                        : "❌ Şu anda sözlük servisine ulaşamadım.";
                }
            }

            // --- Matematik ---
            function safeMath(text) {
                try {

                    if (/^[\d+\-*/(). ]+$/.test(expr)) {
                        const result = Function('"use strict"; return (' + expr + ')')();

            // --- Birim Dönüştürücü ---
            // Not: async yapıldı çünkü döviz çevirisi artık sahte/sabit kur yerine
            // ücretsiz ve anahtar gerektirmeyen open.er-api.com servisinden gerçek
            // güncel kurları çekiyor.
            async function convertUnits(text) {
                const lower = text.toLowerCase();
                // kg -> pound
                let m = lower.match(/^(\d+\.?\d*)\s*kg\s*kaç\s*pound$/i);
                if (m) return `⚖️ ${m[1]} kg = ${(parseFloat(m[1]) * 2.20462).toFixed(2)} pound`;
                m = lower.match(/^(\d+\.?\d*)\s*pound\s*kaç\s*kg$/i);
                if (m) return `⚖️ ${m[1]} pound = ${(parseFloat(m[1]) / 2.20462).toFixed(2)} kg`;
                m = lower.match(/^(\d+\.?\d*)\s*mil\s*kaç\s*km$/i);
                if (m) return `📏 ${m[1]} mil = ${(parseFloat(m[1]) * 1.60934).toFixed(2)} km`;
                m = lower.match(/^(\d+\.?\d*)\s*km\s*kaç\s*mil$/i);
                if (m) return `📏 ${m[1]} km = ${(parseFloat(m[1]) / 1.60934).toFixed(2)} mil`;
                m = lower.match(/^(\d+\.?\d*)°?c\s*kaç\s*°?f$/i);
                if (m) return `🌡️ ${m[1]}°C = ${(parseFloat(m[1]) * 9/5 + 32).toFixed(1)}°F`;
                m = lower.match(/^(\d+\.?\d*)°?f\s*kaç\s*°?c$/i);
                if (m) return `🌡️ ${m[1]}°F = ${((parseFloat(m[1]) - 32) * 5/9).toFixed(1)}°C`;
                m = lower.match(/^(\d+\.?\d*)\s*usd\s*kaç\s*tl$/i);
                if (m) return await convertCurrency(parseFloat(m[1]), 'USD', 'TRY');
                m = lower.match(/^(\d+\.?\d*)\s*tl\s*kaç\s*usd$/i);
                if (m) return await convertCurrency(parseFloat(m[1]), 'TRY', 'USD');
                return null;
            }

            // --- Ücretsiz, anahtar gerektirmeyen gerçek zamanlı döviz kuru API'si ---
            // open.er-api.com tamamen ücretsizdir, kayıt/API anahtarı gerektirmez.
            async function convertCurrency(amount, from, to) {
                try {
                    const res = await fetch(`https://open.er-api.com/v6/latest/${from}`);
                    const data = await res.json();
                    if (data.result !== 'success' || !data.rates || !data.rates[to]) {
                        return `❌ Döviz kuru alınamadı.`;
                    }
                    const rate = data.rates[to];
                    const converted = (amount * rate).toFixed(2);
                    const label = from === 'USD' ? 'USD' : 'TL';
                    const toLabel = to === 'USD' ? 'USD' : 'TL';
                    return `💰 ${amount} ${label} = ${converted} ${toLabel} (güncel kur: 1 ${from} = ${rate.toFixed(4)} ${to})`;
                } catch (err) {
                    return `❌ Şu anda döviz kuru servisine ulaşamadım.`;
                }
            }

            // --- Çeviri (Google Translate API ücretsiz MyMemory üzerinden) ---
            async function translateText(text) {
                const lower = text.toLowerCase();

                let m = lower.match(/^ingilizce'?de?\s*(.+?)\s*ne\??$/i);
                if (m) {

                    } catch {
                        return `❌ Çeviri servisine ulaşılamadı.`;
                    }
                }
                // Ne demek?
                m = lower.match(/^(.+?)\s*ne demek\??$/i);
                if (m) {
                    const word = m[1].trim();
                    try {
                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|tr`);

                    } catch {
                        return `❌ Çeviri servisine ulaşılamadı.`;
                    }
                }
                // Türkçe'ye çevir
                m = lower.match(/^türkçe'?ye?\s*çevir\s*:\s*(.+)$/i);
                if (m) {
                    const textToTranslate = m[1].trim();
                    try {
                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(textToTranslate)}&langpair=en|tr`);
                        const data = await res.json();

                        }

            // --- Metin Analizi ---
            function textAnalysis(text) {
                const lower = text.toLowerCase();
                let m = lower.match(/^metindeki\s*kelime\s*sayısı\s*:\s*(.+)$/i);
                if (m) {
                    const content = m[1].trim();
                    const words = content.split(/\s+/).filter(w => w.length > 0);
                    return `📊 Kelime sayısı: ${words.length}\nKarakter sayısı: ${content.length}`;
                }
                m = lower.match(/^metni\s*özetle\s*:\s*(.+)$/i);
                if (m) {
                    const content = m[1].trim();
                    const sentences = content.split('.').filter(s => s.trim().length > 0);
                    if (sentences.length <= 3) return `📝 Özet: ${content}`;
                    return `📝 Özet: ${sentences.slice(0,3).join('. ')}.`;
                }
                m = lower.match(/^düzelt\s*:\s*(.+)$/i);
                if (m) {
                    const content = m[1].trim();
                    // Basit düzeltmeler
                    const corrections = {
                        'merhaba': 'merhaba',
                        'nasılsın': 'nasılsın',
                        'teşekkürler': 'teşekkürler',
                        'güzel': 'güzel',
                        'bende': 'bende',
                        'sende': 'sende'
                    };
                    let fixed = content;
                    for (const [wrong, correct] of Object.entries(corrections)) {
                        fixed = fixed.replace(new RegExp(wrong, 'gi'), correct);
                    }
                    if (fixed === content) return `✅ Metin düzeltmeye gerek yok: ${content}`;
                    return `✅ Düzeltilmiş metin: ${fixed}`;
                }
                return null;
            }

            function addReminder(text) {

                if (!match) return "❌ Format: 'yarın saat 14:00'te [not]' veya 'bugün saat 15:30'da [not]'";

                const minute = parseInt(match[2]);

                const now = new Date();
                let target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0);

            function savePassword(service, username, password) {
                if (passwords[service]) return `❌ '${service}' zaten mevcut.`;
                // basit base64 benzeri (sadece görünüm için)
                const encoded = btoa(password);
                passwords[service] = { username, password: encoded, created: new Date().toLocaleString() };
                saveData('passwords', passwords);
                return `✅ Şifre kaydedildi: ${service}`;
            }
            function getPassword(service) {
                if (passwords[service]) {
                    const decoded = atob(passwords[service].password);
                    return `🔑 ${service}:\nKullanıcı: ${passwords[service].username}\nŞifre: ${decoded}`;
                }
                return `❌ '${service}' bulunamadı.`;
            }
            function showPasswords() {
                const keys = Object.keys(passwords);
                if (!keys.length) return "🔐 Kayıtlı şifre yok.";
                let result = "🔐 Kayıtlı Servisler:\n\n";
                keys.forEach(k => result += `• ${k}\n`);
                return result;
            }

                try {
                    await navigator.clipboard.writeText(text);
                    return `✅ Panoya kopyalandı: ${text.substring(0,50)}${text.length>50?'...':''}`;
                } catch {
                    return "❌ Panoya kopyalanamadı.";
                }
            }
            async function readClipboard() {
                try {
                    const text = await navigator.clipboard.readText();
                    return text ? `📋 Pano içeriği:\n${text}` : "📋 Pano boş.";
                } catch {
                    return "❌ Pano okunamadı.";
                }
            }
            async function clearClipboard() {
                try {
                    await navigator.clipboard.writeText('');
                    return "✅ Pano temizlendi.";
                } catch {
                    return "❌ Pano temizlenemedi.";
                }
            }

            // ============================================================
            async function handleCommand(text) {
                const trimmed = text.trim();
                if (!trimmed) return;

                const lower = trimmed.toLowerCase();
                const english = isEnglish(trimmed);

                // --- Sesli Yanıt ---
                if (lower === 'sesli yanıtı aç' || lower === 'sesli yanit ac' || lower === 'voice on') {
                    voiceReplyEnabled = true;
                    updateVoiceButtons();
                    saveAllData();
                    addMessage('BRQT', '🔊 Sesli yanıt açıldı. Artık cevaplarımı sesli okuyacağım.');
                    return;
                }
                if (lower === 'sesli yanıtı kapat' || lower === 'sesli yanit kapat' || lower === 'voice off') {
                    voiceReplyEnabled = false;
                    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                    updateVoiceButtons();
                    saveAllData();
                    addMessage('BRQT', '🔇 Sesli yanıt kapatıldı.');
                    return;
                }

                // --- Sohbeti Dışa Aktar ---
                if (lower === 'sohbeti indir' || lower === 'sohbeti dışa aktar' || lower === 'geçmişi indir' || lower === 'export chat') {
                    exportChat();
                    return;
                }

                // --- Web Arama ---
                let m = trimmed.match(/^(?:google'da ara|google da ara|search google|google search)\s+(.+)/i);
                if (m) { searchWeb(m[1].trim(), 'google'); return; }
                m = trimmed.match(/^(?:youtube'da|youtube da|watch on youtube)\s+(.+)/i);
                if (m) { searchWeb(m[1].trim(), 'youtube'); return; }
                m = trimmed.match(/^(?:wikipedia'da|wikipedia da|search wikipedia)\s+(.+)/i);
                if (m) { searchWeb(m[1].trim(), 'wikipedia'); return; }
                m = trimmed.match(/^(?:web'de ara|web de ara|search web)\s+(.+)/i);
                if (m) { searchWeb(m[1].trim(), 'duckduckgo'); return; }

                // --- Hava Durumu (gerçek, ücretsiz Open-Meteo API'si) ---
                m = trimmed.match(/^(?:hava durumu|hava nasıl)\s+(.+)/i) || trimmed.match(/^(.+?)\s*(?:hava durumu|hava nasıl|weather)\??$/i) || trimmed.match(/^weather\s+(?:in|for)?\s*(.+)/i);
                if (m && m[1] && m[1].trim().length > 1) {
                    // Türkçe hal eklerini temizle: "İstanbul'da" -> "İstanbul"
                    const cityClean = m[1].trim().replace(/'?(da|de|ta|te|dan|den|tan|ten)$/i, '');
                    showTyping();
                    const weatherReply = await weatherAnswer(cityClean || m[1].trim(), english);
                    hideTyping();
                    addMessage('BRQT', weatherReply);

                // --- Kripto Para Fiyatı (gerçek, ücretsiz CoinGecko API'si) ---
                m = trimmed.match(/^(.+?)\s*(?:fiyatı|fiyatı nedir|kaç dolar|kaç tl)\??$/i);

                    hideTyping();
                    addMessage('BRQT', cryptoReply);

                // --- Ülke Bilgisi (gerçek, ücretsiz REST Countries API'si) ---
                m = trimmed.match(/^(.+?)\s*(?:hakkında bilgi|ülke bilgisi|nüfusu kaç|başkenti neresi)\??$/i) || trimmed.match(/^(?:ülke bilgisi|country info)\s+(.+)/i);

        • 'sesli yanıtı aç' / 'sesli yanıtı kapat'

        ⬇ Sohbeti Dışa Aktar:
        • 'sohbeti indir' veya ⬇ butonuna tıkla`;
                    addMessage('BRQT', helpText);
                    return;
                }

                // --- Sohbet (genel) ---
                showTyping();
                const reply = await chatReply(trimmed, english);
                hideTyping();
                addMessage('BRQT', reply);
            }

            // ============================================================
            //  OLAY BAĞLAMALARI
            // ============================================================

            // Gönder
            async function sendMessage() {
                const text = inputEl.value;
                if (!text.trim()) return;
                inputEl.value = '';
                addMessage('Sen', text);
                showTyping();
                const delay = Math.min(1400, 350 + text.length * 12);
                await new Promise(res => setTimeout(res, delay));
                hideTyping();
                await handleCommand(text);
            }

            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            sendBtn.addEventListener('click', sendMessage);

            // Ayarlar modal
            settingsBtn.addEventListener('click', () => {
                modal.classList.add('active');
                glowPicker.value = glowColor;
                glowHex.textContent = glowColor;
                updateLangButtons();
            });
            closeModalBtn.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });

            // Renk seçici
            glowPicker.addEventListener('input', (e) => {
                const color = e.target.value;
                glowColor = color;
                applyGlow(color);
                saveAllData();
            });

            // Dil butonları
            langTr.addEventListener('click', () => {
                searchLang = 'tr';
                updateLangButtons();
                saveAllData();
            });
            langEn.addEventListener('click', () => {
                searchLang = 'en';
                updateLangButtons();
                saveAllData();
            });

            // Mikrofon (sesli komut)
            micBtn.addEventListener('click', toggleListening);

            // Sohbeti dışa aktar
            exportBtn.addEventListener('click', exportChat);

            // Sesli yanıt aç/kapat
            voiceOnBtn.addEventListener('click', () => {
                voiceReplyEnabled = true;
                updateVoiceButtons();
                saveAllData();
            });
            voiceOffBtn.addEventListener('click', () => {
                voiceReplyEnabled = false;
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                updateVoiceButtons();
                saveAllData();
            });

            // Pencere kontrolleri
            closeWinBtn.addEventListener('click', () => {
                if (confirm('BRQT\'yi kapatmak istediğinize emin misiniz?')) {
                    window.close();
                }
            });
            minimizeBtn.addEventListener('click', () => {
                // Tarayıcı penceresini küçültmek mümkün değil, sadece uyarı
                alert('Pencere küçültme işlemi tarayıcı tarafından desteklenmiyor.');
            });
            maximizeBtn.addEventListener('click', () => {
                if (!isMaximized) {
                    appWindow.style.width = '100vw';
                    appWindow.style.height = '100vh';
                    appWindow.style.borderRadius = '0';
                    isMaximized = true;
                } else {
                    appWindow.style.width = '780px';
                    appWindow.style.height = '650px';
                    appWindow.style.borderRadius = '28px';
                    isMaximized = false;
                }
            });

            // ============================================================
            //  BAŞLATMA
            // ============================================================

            loadAllData();
            applyGlow(glowColor);
            startReminderChecker();
            startAlarmChecker();
            showWelcome();

            // input'a odaklan
            inputEl.focus();

            // Herhangi bir tıklamada input odaklansın (isteğe bağlı)
            document.addEventListener('click', () => inputEl.focus());

            console.log('BRQT Web Sürümü başlatıldı. 🚀');
        })();
    </script>
